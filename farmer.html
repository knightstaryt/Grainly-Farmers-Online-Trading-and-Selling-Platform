<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sell on Grainly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🌾 Grainly</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="farmer.html">Sell</a></li>
      <li><a href="buyer.html">Buy</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="page-hero">
    <h1>List Your Produce</h1>
    <p>Fill in the details below to list your product directly for buyers to see.</p>
  </section>

  <!-- LISTING FORM -->
  <section class="form-section">
    <div class="form-card">
      <h2>New Product Listing</h2>

      <div class="form-group">
        <label>Farmer Name</label>
        <input type="text" placeholder="Enter your full name" />
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" placeholder="Enter your phone number" />
      </div>

      <div class="form-group">
        <label>Village / Town</label>
        <input type="text" placeholder="Where are you located?" />
      </div>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" placeholder="e.g. Tomatoes, Wheat, Onions" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select>
          <option>Vegetables</option>
          <option>Fruits</option>
          <option>Grains & Pulses</option>
          <option>Dairy Products</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Quantity Available</label>
        <input type="text" placeholder="e.g. 50 kg, 2 quintals" />
      </div>

      <div class="form-group">
        <label>Price per Unit</label>
        <input type="text" placeholder="e.g. ₹30 per kg" />
      </div>

      <div class="form-group">
        <label>Harvest Date</label>
        <input type="date" />
      </div>

      <div class="form-group">
        <label>Product Description</label>
        <textarea placeholder="Describe your produce — freshness, quality, any special details..."></textarea>
      </div>

      <div class="form-group">
        <label>Delivery Available?</label>
        <select>
          <option>Yes, I can deliver</option>
          <option>No, buyer must pick up</option>
          <option>Can discuss</option>
        </select>
      </div>

<button class="submit-btn" onclick="listProduce()">🌱 List My Produce</button>
    </div>
  </section>

  <footer>
    <p>© 2025 Grainly. From soil to sale — directly.</p>
  </footer>

  <script>
    function listProduce() {
      // Get all values
      const name = document.querySelectorAll('input')[0].value.trim();
      const contact = document.querySelectorAll('input')[1].value.trim();
      const location = document.querySelectorAll('input')[2].value.trim();
      const product = document.querySelectorAll('input')[3].value.trim();
      const category = document.querySelectorAll('select')[0].value;
      const quantity = document.querySelectorAll('input')[4].value.trim();
      const price = document.querySelectorAll('input')[5].value.trim();
      const date = document.querySelectorAll('input')[6].value.trim();
      const description = document.querySelector('textarea').value.trim();
      const delivery = document.querySelectorAll('select')[1].value;

      // Validation
      if (!name || !contact || !location || !product || !quantity || !price) {
        alert('⚠️ Please fill in all required fields before listing!');
        return;
      }

      // Build listing object
      const listing = {
        name, contact, location, product,
        category, quantity, price, date,
        description, delivery,
        emoji: getCategoryEmoji(category),
        id: Date.now()
      };

      // Save to localStorage
      const existing = JSON.parse(localStorage.getItem('grainly_listings') || '[]');
      existing.push(listing);
      localStorage.setItem('grainly_listings', JSON.stringify(existing));

      // Success message
      alert('✅ Your produce has been listed successfully on Grainly! Buyers can now see it.');

      // Clear form
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.querySelectorAll('textarea').forEach(t => t.value = '');
    }

    function getCategoryEmoji(category) {
      const map = {
        'Vegetables': '🥦',
        'Fruits': '🍎',
        'Grains & Pulses': '🌾',
        'Dairy Products': '🥛',
        'Other': '🌿'
      };
      return map[category] || '🌱';
    }
  </script>

</body>
</html>
